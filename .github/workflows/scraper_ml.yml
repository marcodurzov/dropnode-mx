name: DropNode ML Scraper

on:
  schedule:
    - cron: '0 14-23 * * *'
    - cron: '30 14-23 * * *'
    - cron: '0 0-4 * * *'
    - cron: '30 0-4 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests supabase==1.2.0 beautifulsoup4 lxml

      - name: Run ML scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHANNEL_FREE_ID: ${{ secrets.CHANNEL_FREE_ID }}
          CHANNEL_VIP_ID: ${{ secrets.CHANNEL_VIP_ID }}
          ML_APP_ID: ${{ secrets.ML_APP_ID }}
          ML_SECRET: ${{ secrets.ML_SECRET }}
          ML_AFFILIATE_ID: ${{ secrets.ML_AFFILIATE_ID }}
          AMAZON_TAG: ${{ secrets.AMAZON_TAG }}
          LAUNCHPASS_LINK: ${{ secrets.LAUNCHPASS_LINK }}
          MAKE_WEBHOOK_URL: ${{ secrets.MAKE_WEBHOOK_URL }}
        run: python github_scraper_ml.py
